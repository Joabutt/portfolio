- title: 'Junior House Leader'
  description: 'Being a junior house leader allowed me to learn about collaboration, rallying big groups of people, and properly communicating with people. Throughout my journey as a junior house leader, I have also picked up many things from my seniors and teachers.'
  date: 'January 2023'
  image: 'house_comm.jpg'
- title: 'House Captain'
  description: 'After stepping up from being a junior house leader and being elected to being a house leader, I had to take on many more projects and opportunities. For example, planning of level wide activities where I had to work with other house leaders and teachers to plan and execute the activities. Through these activities I learnt how to work with people of different backgrounds and how to manage a team.'
  date: 'January 2024'
  image: 'house_poster.jpg'
