page:
  
  - type: image
    data: v2.png
    desc: As time went on, the number of projects I wanted to showcase in different ways grew. And so I decided to try to rebulid my website with a new framework I heard about, <a href="https://astro.build">Astro!</a> Astro was amazing and suited all my needs for many different purposes, like yml filereading for extremely easy access for adding new components and elements to my website when I needed to.
  - type: image
    data: middleman.png
    desc: <a href="https://middlemanapp.com/">Middleman</a> turned out to be a powerful tool for building static websites, robust and extremely configurable. Ruby with its clean language syntax helped to keep the source code readable and maintainable.<br><br>However, its weakness lied in the small userbase and the failure to keep up with the rapidly changing world of web development, with a sole developer struggling to find the time to maintain the project, let alone add new flashy features. The slightest problems then became difficult to solve due to a lack of support and documentation, and I felt that in order to future proof this site, I should start looking for other solutions.
  - type: image
    data: v3.png
    desc: And so <a href="https://astro.build/">Astro</a> caught my eye, sporting a support for all of the popular frameworks, scalability and future proofing that I was seeking. All that was needed was a project rewrite from Ruby to JSX, which only took about a week. <br><br>After the rewrite, the website looks almost identical, but everything under the hood has changed and allowed for various performance optimizations and visual improvements. More importantly, Astro is actively maintained and with an extremely solid foundation in place, it should be a while before Astro fails to meet the needs of my humble portfolio.<br><br>Feel free to check out this site's repository <a href="https://github.com/Joabutt/portfolio">on GitHub</a>!