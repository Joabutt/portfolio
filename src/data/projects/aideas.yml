page:
  - type: image
    data: aideas_1.png
    desc: Aideas is a place where startup ideas are generated by openai's GPT3, and the ideas will be generated based on the context of the previous ideas, and learn and come up with even better and comprehensive ideas.
  - type: image
    data: aideas_2.png
    desc: The database of ideas is growing daily, with over 1 thousand ideas as of 2022. These ideas are hosted on <a href="https://repl.it">Replit</a>, and it also runs the api behind this project.
  - type: image
    data: aideas_3.png
    desc: The frontend of the website is built with <a href="https://pugjs.org/api/getting-started.html">Pug</a>. Pug is a high-performance template engine heavily influenced by Haml and implemented with JavaScript for Node.js and browsers. This really suited my needs as I required very effecient and fast loading times and pug was one of the frameworks which allowed me to do that. The frontend is updated by a script that gets the ideas from the api on replit, then recompiles the code with the new ideas into the pug file which will output as a html file, which is deployed on vercel via github.